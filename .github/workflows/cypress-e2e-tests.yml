name: Cypress E2E Tests

on:
    pull_request:
        types: [opened, synchronize, ready_for_review]
    workflow_dispatch:

# Cancels all previous workflow runs for pull requests that have not completed.
concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
    cancel-in-progress: true

jobs:
    detect_categories:
        name: Detecting E2E Test Shards
        runs-on: ubuntu-latest
        outputs:
            shards: ${{ steps.set_shards.outputs.shards }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Build test shards
              id: set_shards
              run: |
                  shards=$(node .github/scripts/list-e2e-test-shards.js)
                  echo "shards=$shards" >> $GITHUB_OUTPUT
                  echo "Detected shards: $shards"

    prepare:
        name: Prepare Dependencies & Build
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'blockeraai/blockera' || github.event_name == 'pull_request' }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js and install dependencies
              uses: ./.github/setup-node

            - name: Cache Cypress binary
              uses: actions/cache@v4
              id: cypress-cache
              with:
                  path: ~/.cache/Cypress
                  key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install Cypress
              run: npx cypress install

            - name: Install Composer Packages
              uses: ./.github/setup-php
              with:
                  composer-options: '--no-dev -o --apcu-autoloader -a'

            - name: Build plugin assets
              run: npm run build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: blockera-build
                  path: dist/
                  retention-days: 1
                  if-no-files-found: error

    cypress_e2e_tests:
        name: Test (${{ matrix.shard }})
        needs: [detect_categories, prepare]
        runs-on: ubuntu-latest
        timeout-minutes: 60
        if: ${{ github.repository == 'blockeraai/blockera' || github.event_name == 'pull_request' }}
        strategy:
            fail-fast: false
            max-parallel: 10
            matrix:
                include: ${{ fromJson(needs.detect_categories.outputs.shards) }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js and install dependencies
              uses: ./.github/setup-node

            - name: Cache Cypress binary
              uses: actions/cache@v4
              id: cypress-cache
              with:
                  path: ~/.cache/Cypress
                  key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install Cypress
              run: npx cypress install

            - name: Install Composer Packages
              uses: ./.github/setup-php
              with:
                  composer-options: '--no-dev -o --apcu-autoloader -a'

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: blockera-build
                  path: dist/

            - name: Create required environment files
              run: |
                  WP_ENV_CONFIG=".github/wp-env-configs/base.json"

                  if [ -f ".github/wp-env-configs/${{ matrix.env }}.json" ]; then
                    WP_ENV_CONFIG=".github/wp-env-configs/${{ matrix.env }}.json"
                  fi

                  cp "$WP_ENV_CONFIG" .wp-env.json
                  cat .wp-env.json

                  touch .env
                  echo APP_MODE=production >> .env
                  echo DB=wp_tests >> .env
                  cat .env

            - name: Start WordPress Environment
              run: bash .github/scripts/retry-wp-env-start.sh

            - name: Check WordPress Version
              run: |
                  echo "Checking WordPress version..."
                  WP_VERSION=$(npx wp-env run cli wp core version)
                  echo "WordPress version: $WP_VERSION"

            - name: Ensure mu-plugins directory exists for Cypress tests
              run: |
                  npx wp-env run cli -- wp eval 'if (!file_exists(WPMU_PLUGIN_DIR)) { wp_mkdir_p(WPMU_PLUGIN_DIR); }'

            - name: Debug Matrix Shard
              run: |
                  echo "Running shard: ${{ matrix.shard }}"
                  echo "Environment profile: ${{ matrix.env }}"
                  echo "Categories: ${{ toJson(matrix.categories) }}"

            - name: Run Cypress E2E Tests
              env:
                  SHARD_CATEGORIES: ${{ toJson(matrix.categories) }}
              run: node .github/scripts/run-e2e-shard.js

            - name: Stop WordPress Environment
              run: npm run env:stop
